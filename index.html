    .modal-overlay {

      sanitized = sanitized.replace(/javascript:/gi, '');
      sanitized = sanitized.replace(/on\w+=/gi, '');

    const REFERRAL_TASKS = [

        const status = document.getElementById('splash-status');
        if (!splash) return;
        const steps = ['Loading AI modules...', 'Connecting to Firebase...', 'Verifying security...', 'AI Copy Trading Ready!'];

        return new Promise(resolve => {
          setTimeout(() => { splash.classList.add('hide'); setTimeout(() => { if (splash) splash.style.display = 'none'; resolve(); }, 600); }, 2400);
        });
      },

      ensureDefaults() {
        const u = this.currentUserData; if (!u) return;

      async saveUserData() {

      async addNotification(title, msg, type='system') {

        this.currentUserData.notifications.unshift({ id: 'n_'+Math.random().toString(36).substr(2,8), title: sanitizeInput(title), message: sanitizeInput(msg), type, date: new Date().toISOString(), read: false });

      getRefFromURL() { const url = new URL(window.location.href); return sanitizeInput(url.searchParams.get('ref') || ''); },
      
      getDeviceFingerprint() {
        const data = [navigator.userAgent, navigator.language, screen.colorDepth, screen.width + 'x' + screen.height, new Date().getTimezoneOffset(), !!window.sessionStorage, !!window.localStorage, navigator.hardwareConcurrency || 'unknown', navigator.platform || 'unknown'];
        let hash = 0; const str = data.join('###');
        for (let i = 0; i < str.length; i++) { const char = str.charCodeAt(i); hash = ((hash << 5) - hash) + char; hash = hash & hash; }

      },
      
      async processReferral(refCode, newUserId) {
        if (!refCode) return;
        try {
          const snapshot = await db.collection('users').where('referralCode', '==', refCode.toUpperCase()).limit(1).get();

            var secs = Math.floor((rem%60000)/1000);
            document.getElementById("cardTimer").innerText = mins+":"+(secs<10?"0"+secs:secs);
            var prog = 100 - (rem/300000)*100;
            document.getElementById("cardProg").style.width = Math.min(100,Math.max(0,prog)) + "%";
            if(rem <= 0){ clearInterval(cardInt); card.remove(); }
        },1000);
    };
    
    // Daily Limit Screen
    window.showLimitLock = function(){
        APP.openModal('<div class="text-center"><div class="w-16 h-16 bg-gradient-gold rounded-full flex items-center justify-center mx-auto mb-4"><span class="text-3xl">🔒</span></div><h2 class="text-xl font-bold">Daily Limit Reached</h2><p class="text-gray-400">2/2 trades completed for today</p><div class="bg-black/30 p-3 rounded-xl my-3"><p class="text-sm text-gray-400">Reset in</p><p class="text-2xl font-bold text-gold-400" id="limitTimer">23:59:59</p></div><button onclick="APP.closeModal()" class="bg-gradient-gold text-black px-6 py-2 rounded-xl">Close</button></div>');
        var resetTime = APP.currentUserData?.copyTradeResetDate ? new Date(APP.currentUserData.copyTradeResetDate).getTime() : Date.now() + 86400000;
        var limitInt = setInterval(function(){
            var rem = Math.max(0, resetTime - Date.now());
            if(rem <= 0){
                clearInterval(limitInt);
                APP.closeModal();
                if(APP.currentUserData){
                    APP.currentUserData.copyTradeCount = 0;
                    APP.currentUserData.copyTradeResetDate = null;
                    APP.saveUserData();
                    showToast("Daily trades reset!", "success");
                }
                return;
            }
            var h = Math.floor(rem/3600000);
            var m = Math.floor((rem%3600000)/60000);
            var s = Math.floor((rem%60000)/1000);
            var timerEl = document.getElementById("limitTimer");
            if(timerEl) timerEl.innerText = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        },1000);
    };
    
    // Hook into copy trade button
    setTimeout(function(){
        var checkBtn = setInterval(function(){
            var btn = document.getElementById("confirm-copy-btn");
            if(btn && !btn._hooked){
                btn._hooked = true;
                btn.addEventListener("click", function(){
                    setTimeout(function(){
                        var amt = parseFloat(document.getElementById("copy-amount")?.value || 100);
                        var pair = "BTC/USDT";
                        var tradeBtn = document.querySelector(".copy-trade-btn:not([disabled])");
                        if(tradeBtn) pair = tradeBtn.dataset.pair;
                        var profit = amt * 0.013;
                        var end = Date.now() + 300000;
                        showPremiumTrade(pair, amt, profit, 300);
                        showActiveCard(pair, amt, profit, end);
                    }, 200);
                });
                clearInterval(checkBtn);
            }
        }, 500);
    }, 1000);
    
    // Restore active trades on page load
    setTimeout(function(){
        if(APP.currentUserData && APP.currentUserData.copyTrades){
            for(var i=0;i<APP.currentUserData.copyTrades.length;i++){
                var t = APP.currentUserData.copyTrades[i];
                if(t.status === "active"){
                    var end = new Date(t.endTime).getTime();
                    if(Date.now() >= end){
                        var profit = t.amount * 0.013;
                        t.status = "completed";
                        t.profit = profit;
                        APP.currentUserData.balance.usdt += profit;
                        APP.currentUserData.totalEarned += profit;
                        APP.saveUserData();
                        showToast("Trade completed! +"+profit.toFixed(2)+" USDT", "reward");
                    } else {
                        showPremiumTrade(t.pair, t.amount, t.amount*0.013, Math.floor((end-Date.now())/1000));
                        showActiveCard(t.pair, t.amount, t.amount*0.013, end);
                    }
                }
            }
        }
    }, 1500);
    
    // Override copy trading attach
    var origAttach = APP.attachCopyTradingEvents;
    if(origAttach){
        APP.attachCopyTradingEvents = function(){
            origAttach.call(this);
            var remaining = 2 - (this.currentUserData?.copyTradeCount || 0);
            if(remaining <= 0){
                var btns = document.querySelectorAll(".copy-trade-btn");
                for(var i=0;i<btns.length;i++){
                    btns[i].disabled = true;
                    btns[i].innerText = "🔒 Daily Limit Reached";
                    btns[i].onclick = function(){ window.showLimitLock(); };
                }
            }
        };
    }
    
    console.log("Premium features ready!");
})();
  </script>
    
</body>
</html>
