  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
    .glass-panel {
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 1.5rem;
    }
    .bg-gradient-gold {
      background: linear-gradient(135deg, #D4AF37 0%, #FFD700 40%, #F0C75E 100%);
    }
    .text-gradient-gold {
      background: linear-gradient(to right, #D4AF37, #FFD700, #F0C75E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s, visibility 0.6s;
    }
    #splash-screen.hide { opacity: 0; visibility: hidden; }
    
    .splash-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #D4AF37, #FFD700);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      animation: splashPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(212,175,55,0.6);
    }
    
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212,175,55,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 80px rgba(212,175,55,0.8); }
    }
    
    .splash-loader {
      width: 150px;
      height: 3px;
      background: #222;
      border-radius: 10px;
      margin-top: 30px;
      overflow: hidden;
    }
    .splash-loader-bar {
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #FFD700);
      border-radius: 10px;
      animation: loading 1.8s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.6s ease forwards; }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(212,175,55,0.4); }
      50% { box-shadow: 0 0 25px rgba(212,175,55,0.9); }
    }
    .animate-pulse-glow { animation: pulse-glow 2s infinite; }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      top: -10px;
      animation: confetti-fall 3s ease-in forwards;
      z-index: 9999;
      pointer-events: none;
    }
    
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    
    .ripple { position: relative; overflow: hidden; }
    .ripple:active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-effect 0.6s ease-out;
    }
    @keyframes ripple-effect {
      to { transform: scale(4); opacity: 0; }
    }
    
    .progress-bar { transition: width 0.5s ease; }
    
    .spin-wheel-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
    .spin-wheel {
      width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden;
      border: 5px solid #D4AF37;
      box-shadow: 0 0 30px rgba(212,175,55,0.4), 0 0 60px rgba(212,175,55,0.15), inset 0 0 30px rgba(0,0,0,0.5);
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.1, 1);
    }
    .wheel-segment {
      position: absolute; width: 50%; height: 50%; top: 0; left: 50%;
      transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center;
      clip-path: polygon(0% 0%, 100% 0%, 0% 100%);
    }
    .wheel-segment-content {
      position: absolute; left: -28px; top: 18px; width: 56px; text-align: center;
      transform: rotate(-45deg); font-weight: 900; font-size: 10px; color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7); pointer-events: none;
    }
    .spin-pointer {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%); z-index: 10;
      border-left: 16px solid transparent; border-right: 16px solid transparent;
      border-top: 30px solid #D4AF37; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
    }
    .spin-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 55px; height: 55px; background: linear-gradient(135deg, #D4AF37, #B8860B);
      border-radius: 50%; border: 3px solid #FFD700; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 25px rgba(212,175,55,0.6); cursor: pointer;
    }
    .spin-center-text { font-weight: 900; font-size: 11px; color: #000; text-align: center; }
    @keyframes wheelGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(212,175,55,0.4), 0 0 60px rgba(212,175,55,0.15); }
      50% { box-shadow: 0 0 50px rgba(212,175,55,0.8), 0 0 100px rgba(212,175,55,0.3); }
    }
    .spin-wheel-glow { animation: wheelGlow 2s infinite; }
    
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal-content {
      background: #1a1a1a; border: 1px solid rgba(212,175,55,0.25);
      border-radius: 1.5rem; padding: 1.5rem; width: 90%; max-width: 400px;
      max-height: 85vh; overflow-y: auto; transform: scale(0.9); transition: transform 0.3s;
    }
    .modal-overlay.show .modal-content { transform: scale(1); }
    
    .spin-result-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: 3px solid #D4AF37;
      border-radius: 1.5rem; padding: 2rem; z-index: 1100; text-align: center;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 60px rgba(212,175,55,0.5);
    }
    .spin-result-popup.show { transform: translate(-50%, -50%) scale(1); }
    
    .deposit-bonus-banner {
      background: linear-gradient(135deg, #D4AF37, #FFD700);
      color: #000;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      border-radius: 12px;
      margin-bottom: 16px;
      animation: pulse-glow 2s infinite;
    }
  </style>
</head>

  <script>
    // ============ FIREBASE CONFIGURATION ============
   const firebaseConfig = {
  apiKey: "AIzaSyDkGE9Y-a14ysQvBGcZPSQ6JTgpQCbHddg",
  authDomain: "goldenpower.firebaseapp.com",
  projectId: "goldenpower",
  storageBucket: "goldenpower.firebasestorage.app",
  messagingSenderId: "71333869177",
  appId: "1:71333869177:web:7dacf4829dcd0f4650c6a8",
  measurementId: "G-STXNDBXF6C"
};
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Enable Firestore offline persistence
    db.enablePersistence().catch((err) => {
      console.error('Firestore persistence error:', err.code);
    });

    // ============ UTILITIES ============
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const colors = {
        success: 'bg-green-500/90 border-green-400',
        error: 'bg-red-500/90 border-red-400',
        info: 'bg-blue-500/90 border-blue-400',
        reward: 'bg-gradient-gold border-gold-400 text-black font-bold'
      };
      const icons = { success: '✓', error: '✕', info: 'ℹ', reward: '★' };
      const toast = document.createElement('div');
      toast.className = `${colors[type] || colors.info} border px-4 py-3 rounded-xl shadow-2xl text-white text-sm font-medium flex items-center gap-2 animate-float pointer-events-auto`;
      toast.innerHTML = `<span class="text-lg">${icons[type] || ''}</span> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 2800);
    }

    function spawnConfetti(count = 60) {
      const container = document.getElementById('confetti-container');
      if (!container) return;
      const colors = ['#D4AF37','#FFD700','#F0C75E','#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#F472B6','#34D399','#60A5FA'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (Math.random() * 10 + 5) + 'px';
        piece.style.height = (Math.random() * 10 + 5) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    // ============ APP STATE ============
    const APP = {
      user: null,
      currentUserData: null,
      currentPage: 'login',
      _spinning: false,
      _depositAddress: 'TXRsYoutdJBu6jmWjgAT29tpgtVuTwr8en',
      _depositBonusRemaining: 0,
      _initialized: false,
      
      async init() {
        console.log('🚀 App initializing...');
        await this.setupSplash();
        this.setupAuthListener();
        this.startLiveFeed();
        await this.loadDepositBonusCount();
        this._initialized = true;
        console.log('✅ App initialized');
        this.route();
      },
      
      async setupSplash() {
        const splash = document.getElementById('splash-screen');
        const status = document.getElementById('splash-status');
        if (!splash) return;
        
        const steps = ['Loading assets...', 'Connecting to Firebase...', 'Verifying security...', 'Ready!'];
        let i = 0;
        const interval = setInterval(() => {
          if (status && i < steps.length) status.textContent = steps[i];
          i++;
          if (i >= steps.length) clearInterval(interval);
        }, 500);
        
        return new Promise(resolve => {
          setTimeout(() => {
            splash.classList.add('hide');
            setTimeout(() => {
              if (splash) splash.style.display = 'none';
              resolve();
            }, 600);
          }, 2200);
        });
      },
      
      setupAuthListener() {
        auth.onAuthStateChanged(async (firebaseUser) => {
          console.log('🔄 Auth state changed:', firebaseUser ? 'User logged in' : 'No user');
          
          if (firebaseUser) {
            // User is signed in
            this.user = firebaseUser;
            await this.loadUserData(firebaseUser.uid);
            if (!this.currentUserData) {
              // New Firebase user, create profile
              console.log('📝 Creating new user profile...');
              await this.createUserProfile(firebaseUser);
            }
          } else {
            // User is signed out
            this.user = null;
            this.currentUserData = null;
            console.log('👋 User signed out');
          }
          
          if (this._initialized) {
            this.route();
          }
        });
      },
      
      async loadUserData(uid) {
        try {
          console.log('📂 Loading user data for:', uid);
          const doc = await db.collection('users').doc(uid).get();
          if (doc.exists) {
            this.currentUserData = doc.data();
            this.currentUserData.id = uid;
            this.ensureDefaults();
            console.log('👤 User loaded:', this.currentUserData.email);
          } else {
            this.currentUserData = null;
            console.log('❌ No user document found');
          }
        } catch (error) {
          console.error('Error loading user data:', error);
          this.currentUserData = null;
        }
      },
      
      async createUserProfile(firebaseUser) {
        const refCode = this.getRefFromURL();
        const newUser = {
          id: firebaseUser.uid,
          email: firebaseUser.email || '',
            password: '', 
          emailVerified: true,
          username: firebaseUser.email ? firebaseUser.email.split('@')[0] : 'User',
          avatarUrl: this.generateAvatar(),
          balance: { usdt: 0, trx: 0 },
          vipLevel: 0,
          referralCode: 'GOLD' + Math.random().toString(36).substr(2, 5).toUpperCase(),
          referredBy: refCode || null,
          walletAddress: null,
          walletAddressSetAt: null,
          joinDate: new Date().toISOString(),
          plans: [],
          referrals: { 
            l1Count: 0, 
            l2Count: 0, 
            validCount: 0, 
            totalEarnings: 0, 
            members: [] 
          },
          transactions: [],
          notifications: [{
            id: 'welcome',
            title: '🎉 Welcome!',
            message: 'Account created successfully. Start your wealth journey!',
            date: new Date().toISOString(),
            read: false,
            type: 'reward'
          }],
          spinAvailable: 0,
          lastCheckIn: null,
          _checkinDate: null,
          securityPin: '123456',
          twoFactorEnabled: false,
          twoFactorSecret: null,
          totalDeposited: 0,
          totalWithdrawn: 0,
          totalEarned: 0,
          miningPower: 0,
          lastMiningClaim: null,
          depositBonusClaimed: false
        };

        try {
          console.log('💾 Saving new user to Firestore...');
          await db.collection('users').doc(firebaseUser.uid).set(newUser);
          this.currentUserData = newUser;
          console.log('✅ User profile created!');
          
          if (refCode) {
            await this.processReferral(refCode, firebaseUser.uid);
          }
          
          showToast('🎉 Account created!', 'success');
          spawnConfetti(40);
        } catch (error) {
          console.error('❌ Error creating user profile:', error);
          showToast('Error creating account. Please try again.', 'error');
        }
      },
      
      ensureDefaults() {
        const u = this.currentUserData;
        if (!u) return;
        u.balance = u.balance || { usdt: 0, trx: 0 };
        u.plans = u.plans || [];
        u.transactions = u.transactions || [];
        u.notifications = u.notifications || [];
        u.referrals = u.referrals || { l1Count: 0, l2Count: 0, validCount: 0, totalEarnings: 0, members: [] };
        u.spinAvailable = u.spinAvailable || 0;
        u.lastCheckIn = u.lastCheckIn || null;
        u._checkinDate = u._checkinDate || null;
        u.securityPin = u.securityPin || '123456';
        u.twoFactorEnabled = u.twoFactorEnabled || false;
        u.twoFactorSecret = u.twoFactorSecret || null;
        u.username = u.username || (u.email ? u.email.split('@')[0] : 'User');
        u.vipLevel = u.vipLevel || 0;
        u.totalDeposited = u.totalDeposited || 0;
        u.totalWithdrawn = u.totalWithdrawn || 0;
        u.totalEarned = u.totalEarned || 0;
        u.miningPower = u.miningPower || 0;
        u.lastMiningClaim = u.lastMiningClaim || null;
        u.avatarUrl = u.avatarUrl || this.generateAvatar();
        u.referralCode = u.referralCode || ('GOLD' + Math.random().toString(36).substr(2, 5).toUpperCase());
        u.walletAddress = u.walletAddress || null;
        u.walletAddressSetAt = u.walletAddressSetAt || null;
        u.depositBonusClaimed = u.depositBonusClaimed || false;
      },
      
      async saveUserData() {
        if (!this.currentUserData || !this.currentUserData.id) return;
        try {
          const userRef = db.collection('users').doc(this.currentUserData.id);
          await userRef.update(this.currentUserData);
        } catch (error) {
          console.error('Error saving user data:', error);
        }
      },
      
      generateAvatar() {
        const seeds = ['Felix','Mia','Leo','Zoe','Max','Ava','Sam','Kim','Ben','Lia','Jay','Amy'];
        return 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + seeds[Math.floor(Math.random()*seeds.length)] + Math.floor(Math.random()*1000);
      },
      
      async addNotification(title, msg, type='system') {
        if (!this.currentUserData) return;
        if (!this.currentUserData.notifications) this.currentUserData.notifications = [];
        this.currentUserData.notifications.unshift({
          id: 'n_'+Math.random().toString(36).substr(2,8),
          title,
          message: msg,
          type,
          date: new Date().toISOString(),
          read: false
        });
        await this.saveUserData();
      },
      
      getRefFromURL() {
        const url = new URL(window.location.href);
        return url.searchParams.get('ref') || '';
      },
      
      async processReferral(refCode, newUserId) {
        if (!refCode) return;
        try {
          const snapshot = await db.collection('users')
            .where('referralCode', '==', refCode.toUpperCase())
            .limit(1)
            .get();
          
          if (snapshot.empty) return;
          
          const referrerDoc = snapshot.docs[0];
          const referrerData = referrerDoc.data();
          
          // Don't process self-referral
          if (referrerDoc.id === newUserId) return;
          
          referrerData.referrals = referrerData.referrals || { 
            l1Count: 0, l2Count: 0, totalEarnings: 0, members: [] 
          };
          referrerData.referrals.l1Count += 1;
          referrerData.referrals.validCount = (referrerData.referrals.validCount || 0) + 1;
          referrerData.referrals.members = referrerData.referrals.members || [];
          referrerData.referrals.members.push({
            id: newUserId,
            username: this.currentUserData?.username || 'New User',
            email: this.currentUserData?.email || '',
            joinDate: new Date().toISOString(),
            level: 1
          });
          
          referrerData.balance = referrerData.balance || { usdt: 0 };
          referrerData.balance.usdt = (referrerData.balance.usdt || 0) + 2;
          referrerData.totalEarned = (referrerData.totalEarned || 0) + 2;
          referrerData.referrals.totalEarnings = (referrerData.referrals.totalEarnings || 0) + 2;
          
          referrerData.notifications = referrerData.notifications || [];
          referrerData.notifications.unshift({
            id: 'ref_'+Math.random().toString(36).substr(2,8),
            title: '🤝 New Referral!',
            message: (this.currentUserData?.username || 'Someone') + ' joined via your link. +2 USDT!',
            date: new Date().toISOString(),
            read: false,
            type: 'reward'
          });
          
          referrerData.transactions = referrerData.transactions || [];
          referrerData.transactions.unshift({
            id: 'tx_'+Math.random().toString(36).substr(2,8),
            type: 'referral_commission',
            amount: 2,
            currency: 'USDT',
            date: new Date().toISOString(),
            status: 'completed',
            details: 'Referral of ' + (this.currentUserData?.username || 'new user')
          });
          
          await db.collection('users').doc(referrerDoc.id).update(referrerData);
          
          // Give bonus to new user
          if (this.currentUserData) {
            this.currentUserData.balance.usdt = (this.currentUserData.balance.usdt || 0) + 5;

      route() {
        if (!this._initialized) {
          console.log('⏳ Not initialized yet, skipping route');
          return;
        }
        
        const hash = window.location.hash.replace('#', '') || 'login';
        const authPages = ['login', 'register'];
        
        console.log('🧭 Routing to:', hash);
        console.log('👤 Auth state:', auth.currentUser ? 'Logged in' : 'Not logged in');
        
        if (!auth.currentUser && !authPages.includes(hash)) {
          console.log('🔒 Not authenticated, redirecting to login');
          window.location.hash = 'login';
          this.currentPage = 'login';
        } else if (auth.currentUser && authPages.includes(hash)) {
          console.log('🔓 Already authenticated, redirecting to home');
          window.location.hash = 'home';
          this.currentPage = 'home';
        } else {
          this.currentPage = hash;
        }
        
        this.renderPage(this.currentPage);
        this.renderNav();
        this.closeModal();
      },
      
      renderPage(page) {
        console.log('🎨 Rendering page:', page);
        const main = document.getElementById('main-content');
        if (!main) {
          console.error('❌ Main content element not found!');
          return;
        }
        
        const pages = { 
          login: 'renderLogin', 
          register: 'renderRegister', 
          home: 'renderHome', 
          vip: 'renderVIP', 
          deposit: 'renderDeposit', 
          withdraw: 'renderWithdraw', 
          history: 'renderHistory', 
          profile: 'renderProfile', 
          referral: 'renderReferral', 
          plans: 'renderPlans', 
          spin: 'renderSpin', 
          mining: 'renderMining', 
          settings: 'renderSettings' 
        };
        
        const fn = pages[page];
        if (fn && typeof this[fn] === 'function') {
          main.innerHTML = this[fn]();
          console.log('✅ Page rendered:', page);
        } else {
          console.error('❌ Unknown page:', page);
          main.innerHTML = this.renderLogin();
        }
        
        requestAnimationFrame(() => {
          this.attachEvents(page);
          if (window.lucide) {
            try {
              lucide.createIcons();
            } catch(e) {
              console.warn('Lucide icons error:', e);
            }
          }
        });
      },
      
      renderNav() {
        const nav = document.getElementById('bottom-nav');
        const navItems = document.getElementById('nav-items');
        if (!nav || !navItems) return;
        
        if (['login','register'].includes(this.currentPage) || !auth.currentUser) { 
          nav.style.display = 'none'; 
          return; 
        }
        nav.style.display = 'flex';
        
        const items = [
          { path: 'home', icon: 'home', label: 'Home' },
          { path: 'vip', icon: 'shield', label: 'VIP' },
          { path: 'deposit', icon: 'plus-circle', label: 'Deposit', center: true },
          { path: 'referral', icon: 'users', label: 'Team' },
          { path: 'profile', icon: 'user', label: 'Me' }
        ];
        
        navItems.innerHTML = items.map(item => {
          const active = this.currentPage === item.path;
          if (item.center) {
            return `<a href="#deposit" class="relative -top-5 flex flex-col items-center">
              <div class="w-14 h-14 rounded-full bg-gradient-gold p-[3px] shadow-[0_0_25px_rgba(212,175,55,0.5)] animate-pulse-glow">
                <div class="w-full h-full rounded-full bg-[#121212] flex items-center justify-center"><i data-lucide="plus" class="w-7 h-7 text-gold-400"></i></div>
              </div><span class="text-[10px] font-semibold mt-1 text-gold-400">Deposit</span></a>`;
          }
          return `<a href="#${item.path}" class="flex flex-col items-center justify-center w-12 h-12">
            <i data-lucide="${item.icon}" class="w-5 h-5 mb-1 ${active ? 'text-gold-400' : 'text-gray-500'}"></i>
            <span class="text-[10px] font-semibold ${active ? 'text-gold-400' : 'text-gray-500'}">${item.label}</span>
            ${active ? '<div class="absolute -top-1 w-5 h-1 bg-gradient-gold rounded-full"></div>' : ''}
          </a>`;
        }).join('');
        
        setTimeout(() => { 
          if (window.lucide) {
            try {
              lucide.createIcons();
            } catch(e) {}
          }
        }, 50);
      },
      
      attachEvents(page) {
        switch(page) {
          case 'login': this.attachLoginEvents(); break;
          case 'register': this.attachRegisterEvents(); break;
          case 'home': this.attachHomeEvents(); break;
          case 'deposit': this.attachDepositEvents(); break;
          case 'withdraw': this.attachWithdrawEvents(); break;
          case 'referral': this.attachReferralEvents(); break;
          case 'vip': this.attachVIPEvents(); break;
          case 'spin': this.attachSpinEvents(); break;
          case 'mining': this.attachMiningEvents(); break;
          case 'settings': this.attachSettingsEvents(); break;
          case 'profile': this.attachProfileEvents(); break;
          case 'plans': this.attachPlansEvents(); break;
        }
      },
      
      openModal(content) {
        const modal = document.getElementById('global-modal');
        const body = document.getElementById('global-modal-content');
        if (!modal || !body) return;
        body.innerHTML = content;
        modal.classList.add('show');
        modal.onclick = (e) => { if (e.target === modal) this.closeModal(); };
        setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 100);
      },
      
      closeModal() {
        const modal = document.getElementById('global-modal');
        if (modal) modal.classList.remove('show');

          { icon: '💸', txt: 'withdrew 850 USDT' },
          { icon: '📈', txt: 'earned 120 USDT' },
          { icon: '🤝', txt: 'joined via referral' },
          { icon: '🎰', txt: 'won 500 USDT in Spin!' },

        const update = () => {
          if (this.currentPage !== 'home') return;
          const feed = document.getElementById('live-feed');
          if (!feed) return;
          const m = messages[Math.floor(Math.random() * messages.length)];
          const user = '***' + Math.floor(Math.random() * 900 + 100);
          const time = new Date().toLocaleTimeString();
          feed.insertAdjacentHTML('afterbegin', `<p class="border-b border-white/5 pb-1.5 mb-1.5 text-[11px]"><span class="text-gold-400">${m.icon}</span> User ${user} ${m.txt} <span class="text-gray-600 text-[10px]">· ${time}</span></p>`);
          if (feed.children.length > 5) feed.lastElementChild.remove();
        };
        
        update();
        setInterval(update, 4000);

        if (this._spinning) return;
        if ((this.currentUserData?.spinAvailable || 0) < 1) {
          showToast('No spins!', 'error');
          return;
        }
        
        this._spinning = true;
        const spinBtn = document.getElementById('spin-btn');
        const wheel = document.getElementById('spin-wheel');
        const sc = document.getElementById('spin-count');
        const center = document.getElementById('spin-center-btn');
        
        if (spinBtn) { spinBtn.disabled = true; spinBtn.style.opacity = '0.6'; }
        if (center) center.style.pointerEvents = 'none';
        
        this.currentUserData.spinAvailable--;
        if (sc) sc.textContent = this.currentUserData.spinAvailable;
        this.saveUserData();
        
        const prizes = [
          { a: 1000, w: 0.1 }, { a: 500, w: 0.2 }, { a: 100, w: 0.5 },
          { a: 50, w: 1 }, { a: 10, w: 3 }, { a: 5, w: 5 }, { a: 2, w: 90 }
        ];
        let tw = prizes.reduce((s, p) => s + p.w, 0), r = Math.random() * tw, prize = 2;
        for (const p of prizes) {
          r -= p.w;
          if (r <= 0) { prize = p.a; break; }
        }
        
        const map = { 1000: 0, 500: 1, 100: 3, 50: 5, 10: 7 }, twos = [2, 4, 6];
        const pos = map[prize] !== undefined ? map[prize] : twos[Math.floor(Math.random() * 3)];
        const finalDeg = 360 * (5 + Math.floor(Math.random() * 3)) + pos * 45 + 22.5 + (Math.random() - 0.5) * 20;
        
        if (wheel) {
          wheel.style.transition = 'transform 4s cubic-bezier(0.2, 0.8, 0.1, 1)';
          wheel.style.transform = 'rotate(' + finalDeg + 'deg)';
          wheel.classList.remove('spin-wheel-glow');
        }
        
        const self = this;
        setTimeout(async () => {
          self.currentUserData.balance.usdt += prize;
          self.currentUserData.totalEarned += prize;
          self.currentUserData.transactions.unshift({
            id: 'spin_' + Math.random().toString(36).substr(2, 8),
            type: 'spin_win',
            amount: prize,
            currency: 'USDT',
            date: new Date().toISOString(),
            status: 'completed',
            details: 'Lucky Spin'
          });
          
          await self.addNotification('🎰 Spin Win!', 'You won ' + prize + ' USDT!', 'reward');
          await self.saveUserData();
          
          if (wheel) wheel.classList.add('spin-wheel-glow');
          
          const popup = document.getElementById('spin-result-popup');
          if (popup) {
            document.getElementById('result-emoji').textContent = prize >= 500 ? '🤩' : prize >= 100 ? '🥳' : prize >= 50 ? '🎉' : '💰';
            document.getElementById('result-title').textContent = prize >= 500 ? 'JACKPOT!' : prize >= 100 ? 'Huge Win!' : 'You Won!';
            document.getElementById('result-amount').textContent = prize + ' USDT';
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 4000);
          }
          
          if (prize >= 100) spawnConfetti(80);
          else if (prize >= 50) spawnConfetti(35);
          
          showToast('🎰 Won ' + prize + ' USDT!', prize >= 50 ? 'reward' : 'success');
          
          if (self.currentUserData.spinAvailable > 0) {
            if (spinBtn) { spinBtn.disabled = false; spinBtn.textContent = '🎰 SPIN AGAIN'; spinBtn.style.opacity = '1'; }
            if (center) center.style.pointerEvents = 'auto';

APP._deviceFingerprint = null;
APP.getDeviceFingerprint = function() {
  if (this._deviceFingerprint) return this._deviceFingerprint;
  
  const data = [];
  data.push(navigator.userAgent);
  data.push(navigator.language);
  data.push(screen.colorDepth);
  data.push(screen.width + 'x' + screen.height);
  data.push(new Date().getTimezoneOffset());
  data.push(!!window.sessionStorage);
  data.push(!!window.localStorage);
  data.push(navigator.hardwareConcurrency || 'unknown');
  data.push(navigator.platform || 'unknown');
  
  // Simple hash
  let hash = 0;
  const str = data.join('###');
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  this._deviceFingerprint = 'DEV_' + Math.abs(hash).toString(36).substr(0, 8).toUpperCase();
  return this._deviceFingerprint;
};

// Generate TOTP secret
APP.generateTOTPSecret = function() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let secret = '';
  for (let i = 0; i < 16; i++) {
    secret += chars[Math.floor(Math.random() * chars.length)];
  }
  return secret;
};

// Generate TOTP code (simplified but functional)
APP.generateTOTPCode = function(secret) {
  const now = Math.floor(Date.now() / 30000); // 30 second window
  const timeBytes = new ArrayBuffer(8);
  const timeView = new DataView(timeBytes);
  timeView.setBigInt64(0, BigInt(now));
  
  // Simple hash simulation (in production use proper HMAC-SHA1)
  let hash = 0;
  const combined = secret + now.toString();
  for (let i = 0; i < combined.length; i++) {
    hash = ((hash << 5) - hash) + combined.charCodeAt(i);
    hash = hash & hash;
  }
  
  const code = Math.abs(hash % 1000000).toString().padStart(6, '0');
  return code;
};

// Mining countdown timer
APP._miningTimer = null;
APP.attachMiningEvents = function() {
  document.getElementById('claim-mining-btn')?.addEventListener('click', async () => {
    const u = this.currentUserData;
    if (!u?.miningPower) return;
    
    const last = u.lastMiningClaim ? new Date(u.lastMiningClaim) : null;
    const now = new Date();
    const hourly = (u.miningPower * 0.005) / 24;
    let claimable = hourly;
    
    if (last) {
      const h = (now - last) / 3600000;
      if (h < 1) { showToast('Claim once per hour', 'info'); return; }
      claimable = Math.min(h, 24) * hourly;
    }
    
    u.balance.usdt += parseFloat(claimable.toFixed(4));
    u.totalEarned += parseFloat(claimable.toFixed(4));
    u.lastMiningClaim = now.toISOString();
    u.transactions.unshift({
      id: 'tx_' + Math.random().toString(36).substr(2, 8),
      type: 'mining',
      amount: parseFloat(claimable.toFixed(4)),
      currency: 'USDT',
      date: now.toISOString(),
      status: 'completed'
    });
    
    await this.addNotification('⛏ Mining Reward', claimable.toFixed(4) + ' USDT claimed', 'success');
    await this.saveUserData();
    showToast('✅ ' + claimable.toFixed(4) + ' USDT!', 'success');
    this.route();
  });
  
  // Start countdown timer if on mining page
  if (this.currentPage === 'mining') {
    this.startMiningCountdown();
  }
};

APP.startMiningCountdown = function() {
  if (this._miningTimer) clearInterval(this._miningTimer);
  
  const u = this.currentUserData;
  if (!u) return;
  
  const last = u.lastMiningClaim ? new Date(u.lastMiningClaim) : null;
  if (!last) return;
  
  this._miningTimer = setInterval(() => {
    const now = new Date();
    const elapsedMs = now - last;
    const remainingMs = 3600000 - elapsedMs;
    
    if (remainingMs <= 0) {
      clearInterval(this._miningTimer);
      this.route(); // Refresh page
      return;
    }
    
    const display = document.getElementById('mining-countdown');
    if (display) {
      const mins = Math.floor(remainingMs / 60000);
      const secs = Math.floor((remainingMs % 60000) / 1000);
      display.textContent = `${mins}m ${secs}s`;
    }
  }, 1000);
};

// Plan countdown timer in planCard
APP.planCard = function(p) {
  const now = Date.now();
  const elapsed = Math.floor((now - new Date(p.startDate)) / 86400000);
  const progress = Math.min(100, Math.max(0, (elapsed / p.lockDays) * 100));
  const left = Math.max(0, p.lockDays - elapsed);
  const hSince = (now - new Date(p.lastClaim)) / 3600000;
  const claimable = hSince >= 24 ? ((p.amount * p.dailyRoi) / 100).toFixed(2) : 0;
  const expired = hSince > 40;
  const nextClaimHours = Math.ceil(24 - hSince);

  return `<div class="glass-panel rounded-xl p-4 border border-gold-500/15 mb-4">

    </div>
    ${!expired && claimable <= 0 && hSince < 24 ? `
    <div class="bg-black/20 rounded-lg p-2 mb-3 text-center">
      <p class="text-[10px] text-gray-400">⏳ Next claim in: <span class="text-gold-400 font-bold">${nextClaimHours}h ${Math.ceil((nextClaimMinutes % 60))}m</span></p>

const originalAttachLoginEvents = APP.attachLoginEvents;
APP.attachLoginEvents = function() {
  const form = document.getElementById('login-form');
  if (!form) return;
  form.onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email')?.value?.trim();
    const password = document.getElementById('login-password')?.value;
    
    if (!email || !password) { showToast('Fill all fields', 'error'); return; }
    if (password.length < 6) { showToast('Password must be 6+ characters', 'error'); return; }
    
    console.log('🔄 Submitting login form...');
    const result = await this.loginWithEmail(email, password);
    
    if (result === true) {
      console.log('✅ Login form success, redirecting to home');
      showToast('Welcome back! 👋', 'success');
      window.location.hash = 'home';
    } else if (result === '2fa_required') {
      console.log('🔐 2FA verification shown');
      // Don't redirect, 2FA modal is already shown
    }
    // If result is false, error toast already shown
  };
};
